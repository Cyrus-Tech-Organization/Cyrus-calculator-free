<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyrus Calculator | 100 GHS Websites</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    
    .calculator {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 320px;
    }
    
    .brand {
      color: #8a8d91;
      font-size: 12px;
      text-align: center;
      margin-bottom: 10px;
    }
    
    #display {
      width: 100%;
      height: 80px;
      font-size: 36px;
      text-align: right;
      margin-bottom: 20px;
      border: none;
      background: #000;
      color: #00ff41;
      padding: 15px;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
    }
    
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    
    button {
      height: 65px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      background: #333;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }
    
    button:active { 
      transform: scale(0.95);
      background: #444;
    }
    
    .operator { background: #ff9500; }
    .operator:active { background: #ffaa33; }
    
    .equals { 
      background: #ff9500; 
      grid-column: span 2; 
    }
    
    .clear, .del { 
      background: #a6a6a6; 
      color: black; 
    }
    
    .zero { grid-column: span 2; }
    
    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="brand">CYRUS TECH</div>
    <input type="text" id="display" readonly placeholder="0">
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">AC</button>
      <button class="del" onclick="deleteLast()">DEL</button>
      <button class="operator" onclick="appendToDisplay('/')">÷</button>
      <button class="operator" onclick="appendToDisplay('*')">×</button>
      
      <button onclick="appendToDisplay('7')">7</button>
      <button onclick="appendToDisplay('8')">8</button>
      <button onclick="appendToDisplay('9')">9</button>
      <button class="operator" onclick="appendToDisplay('-')">−</button>
      
      <button onclick="appendToDisplay('4')">4</button>
      <button onclick="appendToDisplay('5')">5</button>
      <button onclick="appendToDisplay('6')">6</button>
      <button class="operator" onclick="appendToDisplay('+')">+</button>
      
      <button onclick="appendToDisplay('1')">1</button>
      <button onclick="appendToDisplay('2')">2</button>
      <button onclick="appendToDisplay('3')">3</button>
      <button class="equals" onclick="calculate()">=</button>
      
      <button class="zero" onclick="appendToDisplay('0')">0</button>
      <button onclick="appendToDisplay('.')">.</button>
    </div>
    <div class="footer">Built by Cyrus Bortei | 50 GHS Websites</div>
  </div>

  <script>
    const display = document.getElementById('display');
    
    function appendToDisplay(value) {
      if(display.value === 'Error') clearDisplay();
      display.value += value;
    }
    
    function clearDisplay() {
      display.value = '';
    }
    
    function deleteLast() {
      display.value = display.value.slice(0, -1);
    }
    
    function calculate() {
      try {
        let result = eval(display.value.replace('×', '*').replace('÷', '/').replace('−', '-'));
        display.value = Number.isInteger(result) ? result : result.toFixed(2);
      } catch {
        display.value = 'Error';
        setTimeout(clearDisplay, 1500);
      }
    }
  </script>
</body>
</html>
